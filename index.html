<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>You're Invited 🎉</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #333;
      padding-top: 100px;
      overflow: hidden;
    }

    .emoji { position: fixed; font-size: 24px; animation: float 6s linear infinite; opacity: 0.7; }
    @keyframes float { 0% { transform: translateY(100vh); } 100% { transform: translateY(-10vh); } }

    .card { background: white; padding: 30px; border-radius: 20px; width: 320px; margin: auto; box-shadow: 0 10px 30px rgba(0,0,0,0.2); animation: pop 0.6s ease; }
    @keyframes pop { 0% { transform: scale(0.8); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }

    button { margin: 10px; padding: 10px 20px; border: none; border-radius: 10px; cursor: pointer; font-size: 16px; transition: transform 0.2s; }
    button:hover { transform: scale(1.1); }
    .yes { background: #4CAF50; color: white; }
    .no { background: #f44336; color: white; }
    .hidden { display: none; }
    img.gif { width: 120px; margin: 10px auto; display: block; border-radius: 12px; }
    #responses { margin-top: 20px; text-align: left; }
    iframe { border-radius: 12px; margin: 10px auto; display: block; }
  </style>
</head>
<body>

<div class="emoji" style="left:10%; animation-delay:0s">🎂</div>
<div class="emoji" style="left:30%; animation-delay:2s">✨</div>
<div class="emoji" style="left:50%; animation-delay:4s">🎉</div>
<div class="emoji" style="left:70%; animation-delay:1s">💖</div>
<div class="emoji" style="left:90%; animation-delay:3s">🫶</div>

<div class="card">
  <h2>🎂 You're Invited!</h2>
  <p>Bestie, you are invited to Minjin's birthday dinner and, potentially, an after-pub crawl... Please let me know if you wanna come for dinner or pub crawl or both ❤️😘.</p>

  <img class="gif" src="https://media.giphy.com/media/3o6Zt481isNVuQI1l6/giphy.gif" alt="cute gif">

  <input id="nameInput" placeholder="Enter your name bestie 😌" style="padding:10px; border-radius:10px; border:1px solid #ccc; margin-bottom:10px; width:80%;">
  <div id="buttons">
    <button class="yes" onclick="rsvpYes()">Yes 🎉</button>
    <button class="no" id="noBtn" onclick="rsvpNo()">No 😢</button>
  </div>

  <div id="response" class="hidden"></div>
  <button id="showResponses">👀 See responses</button>
  <div id="responses" class="hidden"></div>
</div>

<script>
let rsvpData = JSON.parse(localStorage.getItem('rsvpData') || '[]');

function saveRSVP(name, answer) {
  rsvpData.push({name, answer});
  localStorage.setItem('rsvpData', JSON.stringify(rsvpData));
}

function rsvpYes() {
  const name = document.getElementById('nameInput').value || 'Anonymous';
  saveRSVP(name, 'Yes');

  const res = document.getElementById('response');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3>Yay! 🎉</h3>
    <iframe width="300" height="150" src="https://www.youtube.com/embed/DJ1pIRhMGs8?autoplay=1&controls=0" 
    title="Dopamine Re-Edit" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <img class="gif" src="https://media.giphy.com/media/l0MYt5jPR6QX5pnqM/giphy.gif">
    <p>Here's the location:</p>
    <p><strong><a href="https://maps.app.goo.gl/cMtqJ7rvLxvYjP7i9" target="_blank">Bělehradská 573/61, 120 00 Vinohrady 📍</a></strong></p>
    <p>Time: 7:30 PM</p>
  `;
  document.getElementById('buttons').style.display = 'none';
}

function rsvpNo() {
  const name = document.getElementById('nameInput').value || 'Anonymous';
  saveRSVP(name, 'No');

  const res = document.getElementById('response');
  res.classList.remove('hidden');
  res.innerHTML = `
    <h3>See you around, pookie 😌</h3>
    <iframe width="300" height="150" src="https://www.youtube.com/embed/IdZz6hGogoo?autoplay=1&controls=0" 
    title="All By Myself" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    <img class="gif" src="https://media.giphy.com/media/OPU6wzx8JrHna/giphy.gif">
  `;
  document.getElementById('buttons').style.display = 'none';
}

// Runaway No button
const noBtn = document.getElementById('noBtn');
let attempts = 0;
noBtn.addEventListener('mouseover', () => {
  attempts++;
  const res = document.getElementById('response');

  if (attempts < 4) {
    const x = Math.random() * (window.innerWidth - 100);
    const y = Math.random() * (window.innerHeight - 50);
    noBtn.style.position = 'fixed';
    noBtn.style.left = x + 'px';
    noBtn.style.top = y + 'px';

    res.classList.remove('hidden');
    res.innerHTML = `<p>why are you like this 😭</p>`;
  } else {
    noBtn.style.position = 'static';
    res.innerHTML = `<p>fine… if you insist 🙄</p>`;
  }
});

// Show stored responses
document.getElementById('showResponses').addEventListener('click', () => {
  const responsesDiv = document.getElementById('responses');
  responsesDiv.classList.toggle('hidden');
  responsesDiv.innerHTML = '<h4>RSVPs:</h4>' + rsvpData.map(r => `<p>${r.name}: ${r.answer}</p>`).join('');
});
</script>

</body>
</html>
